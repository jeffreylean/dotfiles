# Omarchy laptop-specific tmux config. Keep this out of macOS.

set-option -g terminal-overrides "linux*:AX@,xterm-256color:Tc,*:RGB"

# Preserve modified keys like Shift+Enter for TUIs such as Pi.
# Ghostty reports itself as xterm-ghostty and tmux 3.6 does not infer extkeys for it.
set-option -g terminal-features[3] "xterm-ghostty:extkeys"
set -g extended-keys on
set -g extended-keys-format csi-u
set -sg escape-time 10
