# Entrypoint for tmux on both machines.
# macOS installs this directory at ~/.tmux.
# Omarchy/Linux installs it at ~/.config/tmux.

# Keep these as literal top-level source-file lines.
# TPM parses tmux.conf text to discover plugin declarations in sourced files.
source-file -q ~/.tmux/common.conf
source-file -q ~/.config/tmux/common.conf

source-file -q ~/.tmux/macos.conf
source-file -q ~/.config/tmux/linux.conf

if-shell 'test "$(uname -s)" = Linux && test -d "$HOME/.local/share/omarchy"' \
  'source-file -q ~/.config/tmux/omarchy.conf'

source-file -q ~/.tmux/local.conf
source-file -q ~/.config/tmux/local.conf

# Initialize TPM after all shared, OS-specific, and local plugin declarations.
if-shell 'test "$(uname -s)" = Darwin && test -x "$HOME/.tmux/plugins/tpm/tpm"' \
  'run -b ~/.tmux/plugins/tpm/tpm'

if-shell 'test "$(uname -s)" = Linux && test -x "$HOME/.config/tmux/plugins/tpm/tpm"' \
  'run -b ~/.config/tmux/plugins/tpm/tpm'
