# When default-terminal is set to tmux-256color, Helix and other TUIs get
# correct highlighting. The outer terminal must still advertise truecolor.
# https://gist.github.com/bbqtd/a4ac060d6f6b9ea6fe3aabe735aa9d95
# https://gpanders.com/blog/the-definitive-guide-to-using-tmux-256color-on-macos/

set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"
set -g status on

set-window-option -g automatic-rename on
set-window-option -g mode-keys vi
set-option -g set-titles on
set -g status-keys vi
set -g history-limit 10000
setw -g mode-keys vi

# Remove default bindings to avoid collisions with custom bindings.
unbind [
unbind ]
unbind space
unbind enter
unbind C-b
unbind p

# Clipboard settings with vi mode. OS-specific files provide the y binding.
bind p paste-buffer
bind -Tcopy-mode-vi 'v' send -X begin-selection
bind Escape copy-mode

# Synchronize panes.
bind t set-window-option synchronize-panes

# Set prefix to Ctrl-Space.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

set -g base-index 1
set -g pane-base-index 1
set -g mouse on

bind S send-keys 'source ~/.zshrc' Enter

#### COLOUR

# Default statusbar colors.
set-option -g status-style bg=colour235,fg=colour136,default

# Default window title colors.
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# Active window title colors.
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# Pane border.
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour136,bg=colour235

# Message text.
set-option -g message-style bg=colour235,fg=colour166

# Pane number display.
set-option -g display-panes-active-colour colour64  #blue
set-option -g display-panes-colour colour166 #orange

# Clock.
set-window-option -g clock-mode-colour colour64 #green

# Bell.
set-window-option -g window-status-bell-style fg=black,bg=red #base02, red

# kmux-status.
set-option -g status-right '#{kcontext}'

# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'tardunge/kmux-status'
